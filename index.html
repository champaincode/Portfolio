    <!-- ══════════════════════════════════════════════════════════
         🔒 SECURITY HEADERS
         ══════════════════════════════════════════════════════════ -->

    <!-- Content Security Policy: whitelist de fuentes permitidas -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: blob:
          https://flagcdn.com
          https://upload.wikimedia.org;
        connect-src 'self';
        frame-src 'none';
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;
      "
    />

    <!-- Evita MIME-type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />

    <!-- No enviar Referer a dominios externos -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Deshabilita DNS prefetch no autorizado -->
    <meta http-equiv="x-dns-prefetch-control" content="off" />

    <!-- Previene clickjacking (navegadores legacy) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />

    <!-- ══════════════════════════════════════════════════════════
         ⚡ PERFORMANCE — Preconnect / DNS-prefetch / Preload
         ══════════════════════════════════════════════════════════ -->

    <!-- Preconnect para fuentes (conexión CORS anticipada) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />

    <!-- DNS prefetch para imágenes de banderas -->
    <link rel="dns-prefetch" href="https://flagcdn.com" />

    <!-- Google Fonts con display=swap (evita FOIT) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700&family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <!-- ══════════════════════════════════════════════════════════
         🧠 STRUCTURED DATA — Schema.org Person

      }
    }
    </script>
  </head>

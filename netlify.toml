# ════════════════════════════════════════════════════════
#  🔒  NETLIFY SECURITY CONFIGURATION
#  Aplica cabeceras de seguridad HTTP en producción.
#  Estas cabeceras complementan las del index.html y son
#  la capa de protección más robusta (no puede ser ignorada
#  por el navegador a diferencia de las meta-tags).
# ════════════════════════════════════════════════════════

[build]
  publish = "dist"
  command = "npm run build"

# ── Cabeceras globales para todas las rutas ────────────────
[[headers]]
  for = "/*"
  [headers.values]

    # Previene clickjacking
    X-Frame-Options = "DENY"

    # Previene MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # Control de referrer
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Fuerza HTTPS durante 1 año (HSTS)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Deshabilita APIs del navegador no necesarias
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), bluetooth=(), accelerometer=(), gyroscope=(), magnetometer=()"

    # Content Security Policy (adaptada para SPA + Google Fonts)
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://flagcdn.com https://upload.wikimedia.org;
      connect-src 'self';
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    """

# ── Caché agresivo para assets con hash (immutable) ──────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── SPA redirect: todas las rutas van a index.html ────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
